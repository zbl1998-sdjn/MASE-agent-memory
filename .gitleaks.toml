# gitleaks config — extends the built-in default ruleset.
# Add project-specific rules here if you ever need them.
# To audit the entire history:  gitleaks detect --source . --redact

[extend]
useDefault = true

[[allowlists]]
description = "env template uses placeholder __replace_me__ values"
paths = ['''\.env\.example$''']

[[allowlists]]
description = "model configs store environment variable names, not API key values"
regexTarget = "match"
regexes = [
  '''["']?api_key_env["']?\s*:\s*["'][A-Z][A-Z0-9_]*_API_KEY["']''',
]
