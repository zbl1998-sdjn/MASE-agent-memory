# gitleaks 配置：继承内置默认规则集。
# 如需项目专属规则，优先追加到本文件，避免在源码中写假密钥绕过扫描。
# 全历史审计命令：gitleaks detect --source . --redact

[extend]
useDefault = true

[[allowlists]]
description = "env 模板只使用 __replace_me__ 占位值"
paths = ['''\.env\.example$''']

[[allowlists]]
description = "模型配置只保存环境变量名，不保存 API key 值"
regexTarget = "match"
regexes = [
  '''["']?api_key_env["']?\s*:\s*["'][A-Z][A-Z0-9_]*_API_KEY["']''',
]
