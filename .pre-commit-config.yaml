minimum_pre_commit_version: "3.5.0"

repos:
  # 密钥扫描是提交前第一道防线；2026-04-19 密钥泄露审计后加入。
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (block API keys / secrets)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key
      # 阻止 UTF-16 / 空字节 Python 文件进入仓库，避免解释器和 diff 工具失真。
      - id: fix-byte-order-marker

  - repo: local
    hooks:
      - id: no-null-bytes-in-py
        name: No null bytes / UTF-16 in .py
        entry: python scripts/hooks/check_py_encoding.py
        language: python
        types: [python]
        pass_filenames: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
        # 全仓格式化尚未排期前，format 只做手动建议，不在普通提交中大面积改动。
        stages: [manual]
