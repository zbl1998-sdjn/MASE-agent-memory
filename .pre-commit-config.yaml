minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key
      # Blocks UTF-16 / null-byte .py files from ever entering the repo again.
      - id: fix-byte-order-marker

  - repo: local
    hooks:
      - id: no-null-bytes-in-py
        name: No null bytes / UTF-16 in .py
        entry: python scripts/hooks/check_py_encoding.py
        language: python
        types: [python]
        pass_filenames: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
        # format is advisory only until an explicit project-wide reformat is scheduled.
        stages: [manual]
