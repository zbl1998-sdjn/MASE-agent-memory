# 本地演示/集成用 Compose 配置。
# 运行产物通过 MASE_RUNS_DIR 挂到 /runs，避免容器把 memory/results 写回源码树。
services:
  mase_core:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MASE_CONFIG_PATH=/app/config.json
      - MASE_RUNS_DIR=/runs
    volumes:
      - ${MASE_RUNS_DIR:-../MASE-runs}:/runs

  # 可选：如果需要在 Compose 内一并带起本地模型服务
  # ollama:
