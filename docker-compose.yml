services:
  mase_core:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MASE_CONFIG_PATH=/app/config.json
      - MASE_RUNS_DIR=/runs
    volumes:
      - ${MASE_RUNS_DIR:-../MASE-runs}:/runs

