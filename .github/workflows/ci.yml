name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-compile:
    name: Lint & compile (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Whitespace gate
        run: git diff --check

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Encoding gate (no UTF-16 / no null bytes in .py files)
        shell: bash
        run: |
          python - <<'PY'
          import pathlib, sys
          bad = []
          skip = ("legacy_archive", "run_artifacts", "dist", "build", ".venv", "venv",
                  "benchmarks/external-benchmarks", "__pycache__", ".pytest_cache")
          for p in pathlib.Path(".").rglob("*.py"):
              s = p.as_posix()
              if any(seg in s for seg in skip):
                  continue
              data = p.read_bytes()
              if data.startswith(b"\xff\xfe") or data.startswith(b"\xfe\xff") or b"\x00" in data:
                  bad.append(s)
          for b in bad:
              print(b)
          sys.exit(1 if bad else 0)
          PY

      - name: Compile-all (syntax gate)
        run: |
          python -m compileall -q \
            -x "(legacy_archive|run_artifacts|dist|build|\\.venv|venv|benchmarks/external-benchmarks|__pycache__|\\.pytest_cache)" \
            .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Repo hygiene gate
        run: python scripts/audit_repo_hygiene.py --strict

      - name: Benchmark anti-overfit gate
        run: python scripts/audit_anti_overfit.py --strict

  test:
    name: Pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-and-compile
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Only unit tests by default. Integration/slow tests require live model backends.
      - name: Run unit tests
        run: python -m pytest -m "not integration and not slow" -q

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Type check frontend
        run: npm --prefix frontend run typecheck

      - name: Test frontend
        run: npm --prefix frontend test

      - name: Build frontend
        run: npm --prefix frontend run build
